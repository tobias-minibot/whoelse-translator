<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHO ELSE? — Universal Translator</title>
  <meta name="description" content="See how 'Who else?' is expressed in every major world language. A living companion to the 'Who Else?' as Universal Grammar white paper." />
  <link rel="stylesheet" href="styles.css" />
  <!-- Noto fonts for broad Unicode coverage -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&family=Noto+Sans+Hebrew:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&family=Noto+Sans+Telugu:wght@400;700&family=Noto+Sans+Georgian:wght@400;700&family=Noto+Sans+Tibetan:wght@400;700&family=Noto+Sans+Khmer:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="app-container">
  <!-- ===== Header ===== -->
  <header class="header" role="banner">
    <h1 class="header__title">WHO ELSE?<span>Universal Translator</span></h1>
    <div class="header__center">
      <span class="header__speakers" aria-label="Total speakers">
        <span class="counter__number">0</span>
        <span class="counter__label">loading…</span>
      </span>
    </div>
    <div class="header__controls">
      <button class="btn btn--sm" id="btn-random" aria-label="Show random language">&#127922; Random</button>
      <button class="btn btn--sm" id="btn-tour" aria-label="Start tour mode">&#127760; Tour</button>
      <button class="btn mobile-menu-btn btn--icon" aria-label="Open language menu">&#9776;</button>
    </div>
  </header>

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" role="navigation" aria-label="Language browser">
    <div class="sidebar__search">
      <label class="sr-only" for="lang-search">Search languages</label>
      <input type="search" id="lang-search" placeholder="Search languages…" autocomplete="off" />
    </div>
    <div class="sidebar__langs" role="list" aria-label="Languages by family"></div>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main" role="main">
    <!-- Mobile language strip -->
    <div class="lang-strip" role="tablist" aria-label="Select language"></div>

    <!-- Hero: big centered phrase -->
    <section class="hero" aria-live="polite">
      <div class="hero__lang-label"></div>
      <div class="hero__native-name"></div>
      <div class="hero__phrase-wrap">
        <div class="hero__phrase" role="heading" aria-level="2"></div>
        <button class="hero__audio-btn hidden" aria-label="Listen to pronunciation" title="Listen">&#128266;</button>
      </div>
      <div class="hero__romanization"></div>
      <div class="hero__gloss"></div>
    </section>

    <!-- Key Stats: frequency → rank → population → speakers -->
    <section class="key-stats" aria-label="Key statistics">
      <div class="key-stats__frequency">
        <span class="key-stats__number" id="lang-frequency"></span>
        <span class="key-stats__label">uses per day</span>
      </div>
      <div class="key-stats__divider"></div>
      <div class="key-stats__ranked">
        <span class="key-stats__number" id="lang-ranked"></span>
        <span class="key-stats__label" id="lang-ranked-label">phrase rank</span>
      </div>
      <div class="key-stats__divider"></div>
      <div class="key-stats__population">
        <span class="key-stats__number" id="lang-population"></span>
        <span class="key-stats__label">of world population</span>
      </div>
      <div class="key-stats__divider"></div>
      <div class="key-stats__speakers">
        <span class="key-stats__number" id="lang-speakers"></span>
        <span class="key-stats__label">native speakers</span>
      </div>
    </section>

    <!-- World Map -->
    <section class="world-map-section" aria-label="Geographic distribution">
      <h3 class="world-map-section__title">Spoken in</h3>
      <div class="world-map" id="world-map-container"></div>
    </section>

    <!-- Info Panel -->
    <section class="info-panel" aria-label="Language details">
      <div class="info-panel__grid"></div>
      <div class="info-panel__note">
        <div class="info-panel__note-label">How this language says "else"</div>
        <p class="info-panel__note-text"></p>
      </div>
    </section>

    <!-- Universal Phrases with frequency -->
    <section class="universal-phrases" aria-label="Universal everyday phrases">
      <h3 class="universal-phrases__title">Common Phrases in <span class="universal-phrases__lang-name"></span></h3>
      <div class="universal-phrases__grid"></div>
    </section>

    <!-- Bottom Actions: Copy + Share -->
    <div class="actions actions--bottom">
      <button class="btn" id="btn-copy" aria-label="Copy phrase">&#128203; Copy</button>
      <button class="btn btn--gold" id="btn-share" aria-label="Create share card">&#128247; Share Card</button>
    </div>
  </main>
</div>

<!-- Tour Banner -->
<div class="tour-banner" role="status" aria-live="polite">
  &#127760; Tour the World mode active
  <button aria-label="Stop tour">Stop</button>
</div>

<!-- Share Modal -->
<div class="share-modal" role="dialog" aria-label="Share card" aria-modal="true">
  <div class="share-modal__inner">
    <h3>Share Card</h3>
    <div class="share-modal__canvas-wrap">
      <canvas id="share-canvas"></canvas>
    </div>
    <div class="share-modal__actions">
      <button class="btn btn--gold" id="share-download">&#11015; Download PNG</button>
      <button class="btn" id="share-copy">&#128203; Copy Image</button>
      <button class="btn" id="share-close">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" role="status" aria-live="polite"></div>

<script src="languages.js"></script>
<script src="worldmap.js"></script>
<script src="app.js"></script>
</body>
</html>
