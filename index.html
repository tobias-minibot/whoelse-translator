<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHO ELSE? — Universal Translator</title>
  <meta name="description" content="See how 'Who else?' is expressed in every major world language. A living companion to the 'Who Else?' as Universal Grammar white paper." />
  <link rel="stylesheet" href="styles.css" />
  <!-- Noto fonts for broad Unicode coverage -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&family=Noto+Sans+Hebrew:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&family=Noto+Sans+Telugu:wght@400;700&family=Noto+Sans+Georgian:wght@400;700&family=Noto+Sans+Tibetan:wght@400;700&family=Noto+Sans+Khmer:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="app-container">
  <!-- ===== Header ===== -->
  <header class="header" role="banner">
    <h1 class="header__title">WHO ELSE?<span>Universal Translator</span></h1>
    <div class="header__controls">
      <button class="btn mobile-menu-btn btn--icon" aria-label="Open language menu">&#9776;</button>
    </div>
  </header>

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" role="navigation" aria-label="Language browser">
    <div class="sidebar__search">
      <label class="sr-only" for="lang-search">Search languages</label>
      <input type="search" id="lang-search" placeholder="Search languages…" autocomplete="off" />
    </div>
    <div class="sidebar__langs" role="list" aria-label="Languages by family"></div>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main" role="main">
    <!-- Counter + Mini Map Row -->
    <section class="counter-row">
      <div class="mini-map" aria-hidden="true">
        <svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
          <!-- North America -->
          <path id="region-north-america" d="M50,50 L180,30 L220,60 L210,100 L170,140 L150,170 L120,160 L80,130 L40,100 Z" />
          <!-- Central America -->
          <path id="region-central-america" d="M120,160 L150,170 L160,200 L150,220 L130,210 L110,190 Z" />
          <!-- South America -->
          <path id="region-south-america" d="M150,220 L190,230 L210,270 L220,320 L200,370 L170,380 L140,350 L120,300 L130,250 Z" />
          <!-- Europe West -->
          <path id="region-europe-west" d="M340,40 L390,35 L410,50 L420,80 L400,110 L370,120 L340,100 L330,70 Z" />
          <!-- Europe East -->
          <path id="region-europe-east" d="M410,30 L470,25 L500,50 L510,90 L480,110 L440,100 L420,80 L410,50 Z" />
          <!-- Middle East -->
          <path id="region-middle-east" d="M440,110 L510,100 L540,130 L530,170 L490,180 L450,160 L430,140 Z" />
          <!-- North Africa -->
          <path id="region-north-africa" d="M330,130 L430,120 L450,160 L440,190 L380,200 L340,190 L310,160 Z" />
          <!-- West Africa -->
          <path id="region-west-africa" d="M310,190 L360,200 L370,240 L340,260 L300,250 L290,220 Z" />
          <!-- East Africa -->
          <path id="region-east-africa" d="M440,190 L480,200 L490,250 L470,290 L440,280 L420,240 L410,210 Z" />
          <!-- South Africa -->
          <path id="region-south-africa" d="M370,260 L420,260 L440,300 L430,340 L400,360 L370,340 L360,300 Z" />
          <!-- Central Asia -->
          <path id="region-central-asia" d="M500,50 L570,40 L600,70 L590,100 L550,110 L510,90 Z" />
          <!-- South Asia -->
          <path id="region-south-asia" d="M540,130 L590,120 L620,150 L610,200 L580,220 L550,200 L530,170 Z" />
          <!-- East Asia -->
          <path id="region-east-asia" d="M600,40 L680,30 L720,60 L710,110 L670,130 L630,120 L600,90 Z" />
          <!-- Southeast Asia -->
          <path id="region-southeast-asia" d="M620,160 L680,150 L720,180 L730,220 L700,240 L660,230 L630,200 Z" />
          <!-- Oceania -->
          <path id="region-oceania" d="M700,280 L760,270 L780,310 L770,350 L730,360 L700,340 L690,310 Z" />
          <!-- Caucasus -->
          <path id="region-caucasus" d="M480,90 L510,85 L520,100 L510,110 L490,110 L480,100 Z" />
        </svg>
      </div>
      <div class="counter" aria-live="polite">
        <div class="counter__number" aria-label="Speaker count">0</div>
        <div class="counter__label">loading…</div>
      </div>
    </section>

    <!-- Hero -->
    <section class="hero" aria-live="polite">
      <div class="hero__lang-label"></div>
      <div class="hero__native-name"></div>
      <div class="hero__phrase" role="heading" aria-level="2"></div>
      <div class="hero__romanization"></div>
      <div class="hero__gloss"></div>
      <button class="hero__audio-btn hidden" aria-label="Listen to pronunciation" title="Listen">&#9654;</button>
    </section>

    <!-- Actions -->
    <div class="actions">
      <button class="btn" id="btn-random" aria-label="Show random language">&#127922; Random</button>
      <button class="btn" id="btn-tour" aria-label="Start tour mode">&#127760; Tour the World</button>
      <button class="btn" id="btn-copy" aria-label="Copy phrase">&#128203; Copy</button>
      <button class="btn btn--gold" id="btn-share" aria-label="Create share card">&#128247; Share Card</button>
    </div>

    <!-- Info Panel -->
    <section class="info-panel" aria-label="Language details">
      <div class="info-panel__grid"></div>
      <div class="info-panel__commonality" aria-label="Conversational frequency"></div>
      <div class="info-panel__note">
        <div class="info-panel__note-label">How this language says "else"</div>
        <p class="info-panel__note-text"></p>
      </div>
    </section>

    <!-- Universal Phrases -->
    <section class="universal-phrases" aria-label="Universal everyday phrases">
      <h3 class="universal-phrases__title">Universal Everyday Phrases</h3>
      <p class="universal-phrases__subtitle">How other universally shared phrases are expressed in <span class="universal-phrases__lang-name"></span></p>
      <div class="universal-phrases__grid"></div>
    </section>
  </main>
</div>

<!-- Tour Banner -->
<div class="tour-banner" role="status" aria-live="polite">
  &#127760; Tour the World mode active
  <button aria-label="Stop tour">Stop</button>
</div>

<!-- Share Modal -->
<div class="share-modal" role="dialog" aria-label="Share card" aria-modal="true">
  <div class="share-modal__inner">
    <h3>Share Card</h3>
    <div class="share-modal__canvas-wrap">
      <canvas id="share-canvas"></canvas>
    </div>
    <div class="share-modal__actions">
      <button class="btn btn--gold" id="share-download">&#11015; Download PNG</button>
      <button class="btn" id="share-copy">&#128203; Copy Image</button>
      <button class="btn" id="share-close">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" role="status" aria-live="polite"></div>

<script src="languages.js"></script>
<script src="app.js"></script>
</body>
</html>
